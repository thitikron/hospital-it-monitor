<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Asset Management — รพ.แม่แตง</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --green: #22c55e; --red: #ef4444; --text: #f1f5f9; --border: #334155; }
        body { background: var(--bg); color: var(--text); font-family: 'Chakra Petch', sans-serif; margin: 0; padding: 20px; }
        
        /* Header & Stats */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .stats { display: flex; gap: 15px; }
        .stat-tag { background: var(--card); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); font-size: 14px; }

        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        /* Device Card */
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .hostname { font-size: 18px; font-weight: bold; color: var(--accent); text-decoration: underline; }
        .ip-addr { font-family: monospace; color: #94a3b8; margin-top: 5px; }
        .status-badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; text-transform: uppercase; }
        
        /* Modal Style (หน้าต่างรายละเอียด) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 5% auto; padding: 30px; width: 80%; max-width: 800px; border-radius: 15px; border: 1px solid var(--accent); position: relative; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close { position: absolute; right: 20px; top: 20px; font-size: 30px; cursor: pointer; }
        
        /* Detail Table in Modal */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .detail-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .detail-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; }
        .detail-value { font-size: 16px; margin-top: 5px; font-weight: 500; }

        .btn-refresh { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 style="margin:0; font-size: 24px;">🖥️ IT Asset Management - แม่แตง</h1>
        <div class="stats">
            <div class="stat-tag">Total: <span id="total-count">0</span></div>
            <div class="stat-tag">Online: <span id="online-count" style="color:var(--green)">0</span></div>
        </div>
    </div>
    <button class="btn-refresh" onclick="fetchData()">↻ Sync Data</button>
</div>

<div class="grid" id="device-grid">
    </div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modal-hostname" style="color:var(--accent); margin-top:0;">Device Details</h2>
        <div id="modal-ip" class="ip-addr" style="font-size:18px; margin-bottom:20px;"></div>
        
        <div class="detail-grid" id="modal-details">
            </div>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQm0MhAuvfAWym8vr8FAI-n0WXwfQnfc4xibIXTadPj92y__oCNIelMQL8O65YNHOh2NfWSoM2wQ3E/pub?gid=0&single=true&output=csv';
    let allData = [];

    async function fetchData() {
        try {
            const res = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',')).slice(1);
            allData = rows.map(r => r.map(c => c.replace(/"/g, '').trim()));
            renderCards();
        } catch (e) { console.error(e); }
    }

    function renderCards() {
        const grid = document.getElementById('device-grid');
        grid.innerHTML = '';
        let online = 0;

        allData.forEach((c, index) => {
            if (c.length < 5) return;
            const lastUpdate = new Date(c[20]);
            const isOnline = (new Date() - lastUpdate) / 1000 / 60 <= 10;
            if (isOnline) online++;

            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => showDetails(index);
            card.innerHTML = `
                <div class="card-header">
                    <div class="status-badge" style="background:${isOnline ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.2)'}; color:${isOnline ? 'var(--green)' : 'var(--red)'}">
                        ● ${isOnline ? 'ONLINE' : 'OFFLINE'}
                    </div>
                </div>
                <div class="hostname">${c[0]}</div>
                <div class="ip-addr">${c[1] || 'No IP'}</div>
                <div style="font-size:12px; margin-top:15px; color:#64748b">Last seen: ${c[20]}</div>
            `;
            grid.appendChild(card);
        });

        document.getElementById('total-count').innerText = allData.length;
        document.getElementById('online-count').innerText = online;
    }

    function showDetails(index) {
        const c = allData[index];
        document.getElementById('modal-hostname').innerText = `📋 ${c[0]}`;
        document.getElementById('modal-ip').innerText = `IP: ${c[1]}`;
        
        const monitors = [c[13], c[14], c[15], c[16], c[17]].filter(m => m && m !== '-').join('<br>');

        const detailsHtml = `
            <div class="detail-item"><div class="detail-label">Mainboard</div><div class="detail-value">${c[4]} ${c[5]}</div><small style="color:var(--accent)">SN: ${c[6]}</small></div>
            <div class="detail-item"><div class="detail-label">Processor</div><div class="detail-value">${c[7]}</div><small>${c[8]}</small></div>
            <div class="detail-item"><div class="detail-label">Memory</div><div class="detail-value">${c[9]} ${c[10]}</div></div>
            <div class="detail-item"><div class="detail-label">Graphics</div><div class="detail-value">${c[11]} (${c[12]})</div></div>
            <div class="detail-item" style="grid-column: span 2;"><div class="detail-label">Monitor Info</div><div class="detail-value" style="font-size:13px; line-height:1.4;">${monitors || '-'}</div></div>
            <div class="detail-item"><div class="detail-label">OS Version</div><div class="detail-value">${c[18]}</div></div>
            <div class="detail-item"><div class="detail-label">Logged User</div><div class="detail-value">${c[19]}</div></div>
        `;
        
        document.getElementById('modal-details').innerHTML = detailsHtml;
        document.getElementById('detailModal').style.display = 'block';
    }

    function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
    window.onclick = (event) => { if (event.target.className === 'modal') closeModal(); }

    fetchData();
    setInterval(fetchData, 60000);
</script>

</body>
</html>
