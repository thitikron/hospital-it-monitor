<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Asset Dashboard — รพ.แม่แตง</title>
    <style>
        /* จัดการหน้าตาให้สวยงาม (Modern Dark Theme) */
        :root { --bg: #0b0e14; --card: #151921; --blue: #00d1ff; --green: #00ff88; --border: #30363d; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; }
        .stats { display: flex; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); flex: 1; text-align: center; }
        .stat-label { color: #8b949e; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 32px; font-weight: bold; margin-top: 10px; }
        .table-container { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 1000px; }
        th { background: #1c212b; padding: 15px; font-size: 12px; color: #8b949e; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-top: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
        .hostname { font-weight: bold; color: #fff; font-size: 15px; }
        .ip-text { font-family: monospace; color: var(--blue); font-size: 12px; }
        .chip { background: #232933; padding: 4px 10px; border-radius: 6px; font-size: 12px; color: var(--blue); border: 1px solid #38444d; }
        .btn-refresh { background: var(--blue); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-refresh:hover { opacity: 0.8; transform: scale(1.05); }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 style="margin:0; color:var(--blue); letter-spacing: 1px;">🏥 โรงพยาบาลแม่แตง</h1>
        <small style="color:#8b949e">IT ASSET CLOUD MONITORING SYSTEM</small>
    </div>
    <button class="btn-refresh" onclick="fetchSheetData()">↻ REFRESH DATA</button>
</div>

<div class="stats">
    <div class="stat-card">
        <div class="stat-label">เครื่องทั้งหมดในระบบ</div>
        <div class="stat-value" id="stat-total" style="color:var(--blue)">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">สถานะ ONLINE</div>
        <div class="stat-value" id="stat-online" style="color:var(--green)">0</div>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>HOSTNAME / IP</th>
                <th>MAINBOARD</th>
                <th>PROCESSOR (CPU)</th>
                <th>CORES / THREADS</th>
                <th>RAM (SIZE/TYPE)</th>
                <th>GRAPHICS (VRAM)</th>
                <th>LAST UPDATE</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="7" style="text-align:center; padding:50px;">กำลังรวบรวมข้อมูลจากระบบ Cloud...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // URL CSV จาก Google Sheet ของพี่
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQm0MhAuvfAWym8vr8FAI-n0WXwfQnfc4xibIXTadPj92y__oCNIelMQL8O65YNHOh2NfWSoM2wQ3E/pub?gid=0&single=true&output=csv';

    async function fetchSheetData() {
        try {
            const res = await fetch(SHEET_CSV_URL);
            const csvText = await res.text();
            // แยกบรรทัดและคอลัมน์
            const rows = csvText.split('\n').map(r => r.split(',')).slice(1);
            
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            let onlineCount = 0;

            rows.forEach(row => {
                if (row.length < 5) return;
                // ลบเครื่องหมายคำพูดออก
                const c = row.map(v => v.replace(/"/g, '').trim());
                
                // คำนวณสถานะ Online (เขียว/แดง) ภายใน 10 นาที
                const lastUpdate = new Date(c[13]);
                const isOnline = (new Date() - lastUpdate) / 1000 / 60 <= 10;
                const dotColor = isOnline ? 'var(--green)' : '#ff4d4d';
                if (isOnline) onlineCount++;

                // ลำดับคอลัมน์ตาม Google Apps Script ที่เราตั้งไว้:
                // 0:Host, 1:IP, 2:Dept, 3:Loc, 4:MB, 5:CPU, 6:Cores, 7:RAM, 8:Type, 9:GPU, 10:VRAM, 11:OS, 12:User, 13:LastUpdate
                tbody.innerHTML += `
                    <tr>
                        <td>
                            <div class="status-dot" style="background:${dotColor}"></div>
                            <span class="hostname">${c[0]}</span><br>
                            <span class="ip-text">${c[1]}</span>
                        </td>
                        <td style="color:#8b949e; font-size:12px;">${c[4]}</td>
                        <td><div style="color:var(--blue)">${c[5]}</div></td>
                        <td><small style="color:#8b949e">${c[6]}</small></td>
                        <td><span class="chip">${c[7]} ${c[8]}</span></td>
                        <td>
                            <div>${c[9]}</div>
                            <small style="color:var(--green)">${c[10] !== '-' ? 'VRAM: ' + c[10] : ''}</small>
                        </td>
                        <td style="font-size:12px; color:#8b949e">${c[13]}</td>
                    </tr>
                `;
            });

            document.getElementById('stat-total').innerText = rows.length;
            document.getElementById('stat-online').innerText = onlineCount;

        } catch (e) { 
            console.error(e);
            document.getElementById('table-body').innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">เกิดข้อผิดพลาดในการดึงข้อมูล ตรวจสอบการ Publish Google Sheet</td></tr>';
        }
    }

    // โหลดครั้งแรกและตั้งเวลาอัปเดตทุก 1 นาที
    fetchSheetData();
    setInterval(fetchSheetData, 60000);
</script>

</body>
</html>
