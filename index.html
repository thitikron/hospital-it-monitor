<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>IT Asset Monitor - รพ.แม่แตง</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --green: #22c55e; --text: #f1f5f9; --border: #334155; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .hostname { font-size: 20px; font-weight: bold; color: var(--accent); text-decoration: underline; margin-bottom: 10px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 50px auto; padding: 30px; width: 85%; max-width: 850px; border-radius: 15px; border: 1px solid var(--accent); position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 35px; cursor: pointer; color: #fff; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .item { background: rgba(0,0,0,0.25); padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .val { font-size: 16px; font-weight: 500; }
        .btn-refresh { background: var(--accent); color: #000; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 25px; }
    </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
    <h1>🏥 IT Asset - รพ.แม่แตง</h1>
    <button class="btn-refresh" id="btn-sync" onclick="fetchData()">↻ Sync Data</button>
</div>

<div class="grid" id="device-grid"></div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="m-host" style="color:var(--accent); margin:0;">Device Name</h2>
        <p id="m-ip" style="font-family:monospace; font-size:18px; color:#94a3b8;"></p>
        <div class="detail-grid" id="m-body"></div>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQm0MhAuvfAWym8vr8FAI-n0WXwfQnfc4xibIXTadPj92y__oCNIelMQL8O65YNHOh2NfWSoM2wQ3E/pub?gid=0&single=true&output=csv';
    let rawData = [];

    async function fetchData() {
        const btn = document.getElementById('btn-sync');
        btn.innerText = '⌛ Loading...';
        try {
            const res = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
            const text = await res.text();
            rawData = text.split('\n').map(r => r.split(',')).slice(1);
            renderCards();
        } catch (e) { alert('Fetch Error!'); }
        btn.innerText = '↻ Sync Data';
    }

    function renderCards() {
        const grid = document.getElementById('device-grid');
        grid.innerHTML = '';
        rawData.forEach((row, i) => {
            const c = row.map(v => v.replace(/"/g, '').trim());
            if (c.length < 15) return;
            const isOnline = (new Date() - new Date(c[20])) / 1000 / 60 <= 10;
            grid.innerHTML += `
                <div class="card" onclick="openModal(${i})">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span style="color:${isOnline ? 'var(--green)' : '#ef4444'}">● ${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
                    </div>
                    <div class="hostname">${c[0]}</div>
                    <div style="font-family:monospace; color:#94a3b8;">${c[1] || 'No IP'}</div>
                    <div style="font-size:12px; color:#475569; margin-top:10px;">Seen: ${c[20]}</div>
                </div>`;
        });
    }

    function openModal(idx) {
        const c = rawData[idx].map(v => v.replace(/"/g, '').trim());
        document.getElementById('m-host').innerText = `🖥️ ${c[0]}`;
        document.getElementById('m-ip').innerText = `IP: ${c[1]}`;
        
        const monitors = [c[13], c[14], c[15], c[16], c[17]].filter(m => m && m !== '' && m !== '-').join('<br>');

        document.getElementById('m-body').innerHTML = `
            <div class="item"><div class="label">Mainboard</div><div class="val">${c[4]} ${c[5]}</div><small style="color:var(--accent)">SN: ${c[6]}</small></div>
            <div class="item"><div class="label">CPU Info</div><div class="val">${c[7]}</div><small>${c[8]}</small></div>
            <div class="item"><div class="label">Memory</div><div class="val">${c[9]} ${c[10]}</div></div>
            <div class="item"><div class="label">Graphics</div><div class="val">${c[11]} / ${c[12]}</div></div>
            <div class="item" style="grid-column: span 2;"><div class="label">Monitors</div><div class="val" style="font-size:13px;">${monitors || '-'}</div></div>
            <div class="item"><div class="label">OS / User</div><div class="val">${c[18]}</div><small>User: ${c[19]}</small></div>
        `;
        document.getElementById('detailModal').style.display = 'block';
    }

    function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
    fetchData();
</script>
</body>
</html>
