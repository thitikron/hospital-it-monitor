<script>
    async function fetchSheetData() {
        const res = await fetch(`${SHEET_CSV_URL}&cachebuster=${new Date().getTime()}`);
        const csv = await res.text();
        const rows = csv.split('\n').map(r => r.split(',')).slice(1);
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        rows.forEach(row => {
            if (row.length < 15) return;
            const c = row.map(v => v.replace(/"/g, '').trim());
            
            // ลำดับใหม่: 0:Host, 1:IP, 4:Brand, 5:Model, 6:MB_SN, 7:CPU, 8:Cores, 9:RAM_S, 10:RAM_T, 13-17:Monitors, 20:Update
            let monitorHtml = "";
            for(let i=13; i<=17; i++) {
                if(c[i] && c[i] !== "" && c[i] !== "0 GB") monitorHtml += `<div class="monitor-item">🖥️ ${c[i]}</div>`;
            }

            tbody.innerHTML += `
                <tr>
                    <td>
                        <span class="hostname" style="font-size: 18px;">${c[0]}</span>
                        <span class="sub-info" style="color:var(--blue); font-weight:bold;">${c[1] || 'N/A'}</span>
                    </td>
                    <td>
                        <div style="color:#fff; font-weight:bold;">ยี่ห้อ: ${c[4]}</div>
                        <div style="color:#fff;">รุ่น: ${c[5]}</div>
                        <span class="sub-info" style="word-break: break-all;">SN: <span class="sn-code">${c[6]}</span></span>
                    </td>
                    <td>
                        <div style="color:var(--blue); font-weight:bold;">${c[7]}</div>
                        <div style="color:#fff; font-size:14px;">${c[8]}</div>
                    </td>
                    <td><span class="chip" style="font-size:16px;">${c[9]} ${c[10]}</span></td>
                    <td>${monitorHtml || '- ไม่มีข้อมูลจอ -'}</td>
                    <td style="font-size:13px; color:#8b949e">${c[20]}</td>
                </tr>`;
        });
    }
</script>
