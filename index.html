<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — โรงพยาบาลแม่แตง</title>
    <style>
        /* CSS สำหรับ Dark Theme */
        :root { --bg: #0b0e14; --card: #151921; --blue: #00d1ff; --green: #00ff88; --border: #30363d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px 25px; border-radius: 8px; border: 1px solid var(--border); flex: 1; }
        .stat-label { color: #8b949e; font-size: 12px; }
        .stat-value { font-size: 24px; font-weight: bold; margin-top: 5px; }
        .table-container { background: var(--card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #1c212b; padding: 12px; font-size: 12px; color: #8b949e; text-transform: uppercase; }
        td { padding: 12px; border-top: 1px solid var(--border); font-size: 14px; }
        .chip { background: #232933; padding: 3px 8px; border-radius: 4px; font-size: 11px; color: var(--blue); }
        .btn-refresh { background: var(--blue); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h2 style="margin:0; color:var(--blue)">🏥 โรงพยาบาลแม่แตง</h2>
        <small style="color:#8b949e">Cloud IT Asset Monitor v2.3</small>
    </div>
    <button class="btn-refresh" onclick="fetchSheetData()">↻ Refresh Data</button>
</div>

<div class="stats">
    <div class="stat-card">
        <div class="stat-label">เครื่องทั้งหมด</div>
        <div class="stat-value" id="stat-total" style="color:var(--blue)">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">ONLINE</div>
        <div class="stat-value" id="stat-online" style="color:var(--green)">0</div>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Hostname / IP</th>
                <th>Mainboard</th>
                <th>CPU Spec</th>
                <th>Cores / Threads</th>
                <th>RAM (Size/Type)</th>
                <th>GPU (VRAM)</th>
                <th>Last Update</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="7" style="text-align:center; padding:40px;">กำลังโหลดข้อมูลจาก Cloud...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // *** สำคัญ: นำ URL CSV ของพี่มาใส่ตรงนี้ครับ ***
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQm0MhAuvfAWym8vr8FAI-n0WXwfQnfc4xibIXTadPj92y__oCNIelMQL8O65YNHOh2NfWSoM2wQ3E/pub?gid=0&single=true&output=csv';

    async function fetchSheetData() {
        try {
            const res = await fetch(SHEET_CSV_URL);
            const csvText = await res.text();
            const rows = csvText.split('\n').map(r => r.split(',')).slice(1);
            
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            let online = 0;

            rows.forEach(row => {
                if (row.length < 5) return;
                const c = row.map(v => v.replace(/"/g, '').trim());
                
                // คำนวณสถานะ Online (10 นาที)
                const lastUpdate = new Date(c[13]);
                const isOnline = (new Date() - lastUpdate) / 1000 / 60 <= 10;
                if (isOnline) online++;

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <div style="font-weight:bold">${c[0]}</div>
                            <div style="font-size:11px; color:var(--blue)">${c[1]}</div>
                        </td>
                        <td style="font-size:11px; color:#8b949e">${c[4]}</td>
                        <td><div style="color:var(--blue)">${c[5]}</div></td>
                        <td><small>${c[6]}</small></td>
                        <td><span class="chip">${c[7]} ${c[8]}</span></td>
                        <td>
                            <div>${c[9]}</div>
                            <small style="color:var(--green)">${c[10] !== '-' ? 'VRAM: ' + c[10] : ''}</small>
                        </td>
                        <td style="font-size:11px; color:#8b949e">${c[13]}</td>
                    </tr>
                `;
            });

            document.getElementById('stat-total').innerText = rows.length;
            document.getElementById('stat-online').innerText = online;

        } catch (e) { console.error(e); }
    }
    fetchSheetData();
    setInterval(fetchSheetData, 60000); // รีเฟรชทุก 1 นาที
</script>

</body>
</html>
